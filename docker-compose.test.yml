services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: convoke
      POSTGRES_PASSWORD: convoke
      POSTGRES_DB: convoke
    tmpfs:
      - /var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: test/Dockerfile.cover
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://convoke:convoke@postgres:5432/convoke?sslmode=disable
      LISTEN_ADDR: ":8080"
      ADMIN_GROUP: admin
      CSRF_SECRET: test-secret
      GOCOVERDIR: /coverage
    volumes:
      - ./coverage:/coverage
    depends_on:
      postgres:
        condition: service_started

  mock-oauth2-proxy:
    image: ghcr.io/schliz/mock-oauth2-proxy:latest
    ports:
      - "4180:4180"
    environment:
      MOCK_UPSTREAM: "http://app:8080"
      MOCK_LISTEN_ADDR: ":4180"
      MOCK_USERS: |
        [
          {"id": "admin", "email": "admin@example.com", "groups": ["admin", "editors"]},
          {"id": "member", "email": "member@example.com", "groups": ["editors"]}
        ]
    depends_on:
      app:
        condition: service_started
