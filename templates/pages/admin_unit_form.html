{{ define "content" }}
<div class="container mx-auto p-4 md:p-8 max-w-2xl">
    <div class="mb-6">
        <a href="/admin/units/" class="btn btn-ghost btn-sm gap-1">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Units
        </a>
    </div>

    <div class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-xl mb-4">
                {{ if .IsNew }}Create Unit{{ else }}Edit Unit{{ end }}
            </h2>

            <form method="POST"
                  action="{{ if .IsNew }}/admin/units/{{ else }}/admin/units/{{ .Unit.ID }}{{ end }}"
                  hx-post="{{ if .IsNew }}/admin/units/{{ else }}/admin/units/{{ .Unit.ID }}{{ end }}"
                  hx-target="body">

                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Name <span class="text-error">*</span></span>
                    </label>
                    <input type="text" name="name" value="{{ .Unit.Name }}"
                           placeholder="e.g. Fire Brigade"
                           class="input input-bordered w-full{{ if index .Errors "name" }} input-error{{ end }}"
                           required />
                    {{ if index .Errors "name" }}
                    <label class="label">
                        <span class="label-text-alt text-error">{{ index .Errors "name" }}</span>
                    </label>
                    {{ end }}
                </div>

                {{ if .IsNew }}
                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Slug <span class="text-error">*</span></span>
                        <span class="label-text-alt">URL-safe identifier, cannot be changed later</span>
                    </label>
                    <input type="text" name="slug" value="{{ .Unit.Slug }}"
                           placeholder="e.g. fire-brigade"
                           class="input input-bordered w-full{{ if index .Errors "slug" }} input-error{{ end }}"
                           pattern="[a-z0-9]+(-[a-z0-9]+)*"
                           required />
                    {{ if index .Errors "slug" }}
                    <label class="label">
                        <span class="label-text-alt text-error">{{ index .Errors "slug" }}</span>
                    </label>
                    {{ end }}
                </div>
                {{ else }}
                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Slug</span>
                        <span class="label-text-alt">Cannot be changed after creation</span>
                    </label>
                    <input type="text" value="{{ .Unit.Slug }}"
                           class="input input-bordered w-full" disabled />
                </div>
                {{ end }}

                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Description</span>
                    </label>
                    <textarea name="description" placeholder="Brief description of this unit"
                              class="textarea textarea-bordered w-full" rows="3">{{ .Unit.Description }}</textarea>
                </div>

                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Contact Email</span>
                    </label>
                    <input type="email" name="contact_email" value="{{ .Unit.ContactEmail }}"
                           placeholder="unit@example.com"
                           class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full mb-4">
                    <label class="label">
                        <span class="label-text font-medium">Admin Group</span>
                        <span class="label-text-alt">IdP group whose members become unit admins</span>
                    </label>
                    <input type="text" name="admin_group" value="{{ .Unit.AdminGroup }}"
                           placeholder="e.g. fire-brigade-admins"
                           class="input input-bordered w-full" />
                </div>

                <div class="form-control w-full mb-6">
                    <label class="label">
                        <span class="label-text font-medium">Group Bindings</span>
                        <span class="label-text-alt">IdP groups whose members belong to this unit</span>
                    </label>
                    <div id="group-bindings" class="flex flex-col gap-2">
                        {{ range .Unit.GroupBindings }}
                        <div class="flex gap-2">
                            <input type="text" name="group_bindings" value="{{ . }}"
                                   placeholder="e.g. fire-fighters"
                                   class="input input-bordered w-full" />
                            <button type="button" class="btn btn-ghost btn-sm text-error"
                                    onclick="this.parentElement.remove()">
                                <span class="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        {{ end }}
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm mt-2 self-start"
                            onclick="addGroupBinding()">
                        <span class="material-symbols-outlined">add</span>
                        Add Group
                    </button>
                </div>

                <div class="card-actions justify-end pt-4 border-t border-base-300">
                    <a href="/admin/units/" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        {{ if .IsNew }}Create Unit{{ else }}Save Changes{{ end }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function addGroupBinding() {
    var container = document.getElementById('group-bindings');
    var row = document.createElement('div');
    row.className = 'flex gap-2';
    row.innerHTML = '<input type="text" name="group_bindings" placeholder="e.g. fire-fighters" class="input input-bordered w-full" />' +
        '<button type="button" class="btn btn-ghost btn-sm text-error" onclick="this.parentElement.remove()">' +
        '<span class="material-symbols-outlined">close</span></button>';
    container.appendChild(row);
    row.querySelector('input').focus();
}
</script>
{{ end }}
